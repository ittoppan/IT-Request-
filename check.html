  <title>🛡️ Checklist System</title>

  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#f39c12', 'primary-dark': '#e67e22', danger: '#e74c3c' }, fontFamily: { prompt: ['Prompt', 'sans-serif'] } } }

  </script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">

<body class="font-prompt bg-gray-100 text-gray-800">

  <div id="loading" class="fixed inset-0 bg-white/90 z-50 hidden flex-col items-center justify-center">
    <i class="fas fa-circle-notch fa-spin text-4xl text-primary"></i>
    <p class="mt-4 font-semibold text-gray-700">กำลังบันทึกข้อมูล...</p>
  </div>

  <header class="bg-gradient-to-r from-orange-500 to-primary text-white py-4 px-4 sticky top-0 z-40 shadow-md">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <h1 class="text-lg font-semibold tracking-wide"><i class="fas fa-clipboard-check mr-2"></i>ระบบ Checklist</h1>
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 py-6 relative z-10">
    <form id="inspectionForm" class="space-y-4">
      
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">👤 ชื่อผู้ตรวจสอบ</label>
            <input type="text" name="inspector" placeholder="ระบุชื่อ-นามสกุล" required class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-primary outline-none transition">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">📋 ประเภทการตรวจ</label>
            <select id="typeSelect" name="type" required onchange="updateAreas()" class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-primary outline-none transition">
              <option value="">-- เลือกประเภท --</option>
              <option value="Safety Patrol">Safety Patrol (จป.ว, คปอ., Foreman, Audit)</option>
              <option value="5S">5S (5ส)</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">📍 พื้นที่สำรวจ</label>
            <select id="areaSelect" name="area" required onchange="renderChecklist()" disabled class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-primary outline-none transition">
              <option value="">-- กรุณาเลือกประเภทก่อน --</option>
            </select>
          </div>
        </div>
      </div>

      <div id="checklistContainer" class="space-y-4"></div>

      <button type="submit" id="submitBtn" disabled class="w-full bg-gray-400 text-white font-semibold py-4 px-6 rounded-2xl shadow-lg transition-all">
        <i class="fas fa-paper-plane mr-2"></i>ส่งรายงาน
      </button>
    </form>
  </main>

    let imgB64 = {};
    let currentSections = [];

    function updateAreas() {
      const type = document.getElementById('typeSelect').value;
      const areaSelect = document.getElementById('areaSelect');
      const submitBtn = document.getElementById('submitBtn');
      const container = document.getElementById('checklistContainer');
      
      areaSelect.innerHTML = '<option value="">-- เลือกพื้นที่/แผนก --</option>';
      container.innerHTML = '';
      submitBtn.disabled = true;
      submitBtn.className = "w-full bg-gray-400 text-white font-semibold py-4 px-6 rounded-2xl shadow-lg transition-all";

      if(type && db[type]) {
        db[type].areas.forEach(a => areaSelect.innerHTML += `<option value="${a}">${a}</option>`);
        areaSelect.disabled = false;
      } else {
        areaSelect.disabled = true;
      }
    }

    function renderChecklist() {
      const type = document.getElementById('typeSelect').value;
      const area = document.getElementById('areaSelect').value;
      const container = document.getElementById('checklistContainer');
      const submitBtn = document.getElementById('submitBtn');
      imgB64 = {};

      if(!area) { container.innerHTML = ''; submitBtn.disabled = true; return; }

      // ค้นหาชุดคำถามที่ตรงกับเงื่อนไข
      if(type === "Safety Patrol") { currentSections = db["Safety Patrol"].sections; }
      else if(type === "5S") { currentSections = db["5S"].sectionsByArea[area] || []; }

      let html = '';
      currentSections.forEach((sec, sIdx) => {
        let cardHtml = `<div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
          <h4 class="text-primary-dark font-semibold mb-4 pb-2 border-l-4 border-primary pl-3">${sec.title}</h4>`;
        
        sec.qs.forEach((qText, qIdx) => {
          let qKey = `sec${sIdx}_q${qIdx}`;
          imgB64[qKey] = [];

          cardHtml += `
            <div class="p-4 border-b border-gray-100 last:border-0" id="item_${qKey}">
              <p class="text-sm font-semibold text-gray-700 mb-3">${qText}</p>
              
              <div class="grid grid-cols-2 gap-3 mb-3">
                <label class="cursor-pointer py-3 px-4 rounded-xl bg-gray-100 text-center font-semibold text-gray-600 transition border-2 border-transparent hover:border-gray-300 has-[:checked]:bg-green-50 has-[:checked]:text-green-700 has-[:checked]:border-green-500">
                  <input type="radio" name="${qKey}" value="ดี" class="hidden" required onchange="toggleBad('${qKey}', false)">
                  <i class="fas fa-check-circle mr-1"></i> ปกติ
                </label>
                <label class="cursor-pointer py-3 px-4 rounded-xl bg-gray-100 text-center font-semibold text-gray-600 transition border-2 border-transparent hover:border-gray-300 has-[:checked]:bg-red-50 has-[:checked]:text-red-700 has-[:checked]:border-red-500">
                  <input type="radio" name="${qKey}" value="ไม่ดี" class="hidden" onchange="toggleBad('${qKey}', true)">
                  <i class="fas fa-exclamation-triangle mr-1"></i> ไม่ปกติ
                </label>
              </div>

              <div id="bad_group_${qKey}" class="hidden mt-3 space-y-3 p-4 bg-red-50 rounded-xl border border-dashed border-red-300">
                 <textarea id="remark_${qKey}" name="remark_${qKey}" rows="2" placeholder="* ระบุปัญหาที่พบ (บังคับ)" class="w-full px-3 py-2 rounded-lg border border-red-300 bg-white focus:border-red-500 outline-none resize-none"></textarea>
                 
                 <div>
                   <label class="text-xs text-red-700 font-semibold block mb-1"><i class="fas fa-calendar-times mr-1"></i> กำหนดวันแก้ไขเสร็จ (Due Date) *</label>
                   <input type="date" id="duedate_${qKey}" name="duedate_${qKey}" class="w-full px-3 py-2 rounded-lg border border-red-300 bg-white focus:border-red-500 outline-none">
                 </div>

                 <div class="pt-2">
                   <div id="preview_${qKey}" class="flex flex-wrap gap-2 mb-2"></div>
                   <button type="button" onclick="document.getElementById('file_${qKey}').click()" class="w-full py-2 px-4 rounded-lg border-2 border-dashed border-red-300 bg-white text-red-600 font-semibold text-sm hover:bg-red-100 transition">
                     <i class="fas fa-camera mr-1"></i> แนบรูปภาพปัญหา
                   </button>
                   <input type="file" id="file_${qKey}" accept="image/*" capture="environment" class="hidden" onchange="processImage(this, '${qKey}')">
                 </div>
              </div>
            </div>`;
        });
        cardHtml += `</div>`;
        html += cardHtml;
      });

      container.innerHTML = html;
      submitBtn.disabled = false;
      submitBtn.className = "w-full bg-gradient-to-r from-primary to-primary-dark text-white font-semibold py-4 px-6 rounded-2xl shadow-lg shadow-primary/30 hover:shadow-primary/50 transition-all";
    }

    function toggleBad(qKey, isBad) {
      const group = document.getElementById(`bad_group_${qKey}`);
      const remark = document.getElementById(`remark_${qKey}`);
      const duedate = document.getElementById(`duedate_${qKey}`);
      if(isBad) {
        group.classList.remove('hidden');
        remark.required = true;
        duedate.required = true;
      } else {
        group.classList.add('hidden');
        remark.required = false; remark.value = '';
        duedate.required = false; duedate.value = '';
      }
    }

    function processImage(input, qKey) {
      if (input.files && input.files[0]) {
        if(imgB64[qKey].length >= 3) { Swal.fire('จำกัด', 'ใส่รูปได้สูงสุด 3 รูปต่อข้อ', 'warning'); return; }
        const loading = document.getElementById('loading');
        loading.classList.remove('hidden'); loading.classList.add('flex');
        
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800; 
            let width = img.width, height = img.height;
            if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
            canvas.width = width; canvas.height = height;
            canvas.getContext("2d").drawImage(img, 0, 0, width, height);
            
            imgB64[qKey].push(canvas.toDataURL("image/jpeg", 0.7));
            renderPreview(qKey);
            loading.classList.add('hidden'); loading.classList.remove('flex');
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function renderPreview(qKey) {
      const container = document.getElementById(`preview_${qKey}`);
      container.innerHTML = '';
      imgB64[qKey].forEach((b64, idx) => {
        container.innerHTML += `<div class="relative w-16 h-16"><img src="${b64}" class="w-full h-full object-cover rounded-lg border border-red-200"><div onclick="removeImg('${qKey}', ${idx})" class="absolute -top-2 -right-2 bg-red-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs cursor-pointer border border-white"><i class="fas fa-times"></i></div></div>`;
      });
      document.getElementById(`file_${qKey}`).value = '';
    }
    function removeImg(qKey, idx) { imgB64[qKey].splice(idx, 1); renderPreview(qKey); }

    document.getElementById('inspectionForm').onsubmit = function(e) {
      e.preventDefault();
      const fd = new FormData(this);
      
      let answers = [];
      let flatImages = {};
      let imgCounter = 0;

      // รวบรวมคำตอบและแยกรูป
      currentSections.forEach((sec, sIdx) => {
        sec.qs.forEach((qText, qIdx) => {
          let qKey = `sec${sIdx}_q${qIdx}`;
          let status = fd.get(qKey);
          if(!status) return;

          let remark = fd.get(`remark_${qKey}`) || "";
          let dueDate = fd.get(`duedate_${qKey}`) || "";
          let picKey = "";

          // ถ้ารูปมีให้สร้างคีย์อ้างอิง
          if(imgB64[qKey] && imgB64[qKey].length > 0) {
            picKey = `img_${imgCounter}`;
            flatImages[picKey] = imgB64[qKey][0]; // ส่งรูปแรกไปสร้าง Action Plan
            imgCounter++;
          }

          answers.push({ section: sec.title, question: qText, status: status, remark: remark, dueDate: dueDate, picKey: picKey });
        });
      });

      const payload = {
        action: "submit_v2",
        inspector: fd.get('inspector'),
        type: fd.get('type'),
        area: fd.get('area'),
        answers: answers,
        images: flatImages
      };

      const loading = document.getElementById('loading');
      loading.classList.remove('hidden'); loading.classList.add('flex');
      
      fetch(API_URL, { method: "POST", body: JSON.stringify(payload), headers: { "Content-Type": "text/plain" } })
      .then(res => res.json())
      .then(res => {
        loading.classList.add('hidden'); loading.classList.remove('flex');
        if(res.status === 'success') {
          Swal.fire({ icon: 'success', title: 'ส่งรายงานสำเร็จ!', text: 'ข้อมูลถูกบันทึกลงระบบเรียบร้อยแล้ว' }).then(() => window.location.reload());
        } else { Swal.fire('ผิดพลาด', res.message, 'error'); }
      }).catch(() => {
        loading.classList.add('hidden'); loading.classList.remove('flex');
        Swal.fire('เชื่อมต่อล้มเหลว', 'โปรดตรวจสอบอินเทอร์เน็ต', 'error');
      });
    };
  </script>
