<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🛡️ SAFETY PATROL - ตรวจสอบพื้นที่</title>
  
  <!-- Tailwind CSS (CDN - สำหรับพัฒนา/ทดสอบ) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#f39c12',
            'primary-dark': '#e67e22',
            success: '#27ae60',
            danger: '#e74c3c'
          },
          fontFamily: {
            prompt: ['Prompt', 'sans-serif']
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <!-- SweetAlert2 Custom Style -->
  <style>
    .swal2-popup { font-family: 'Prompt', sans-serif !important; border-radius: 1rem !important; }
    .swal2-title { font-size: 1.25rem !important; font-weight: 600 !important; }
    .swal2-confirm { border-radius: 0.75rem !important; font-weight: 500 !important; }
  </style>
</head>
<body class="font-prompt bg-gray-100 text-gray-800">

  <!-- Loading Overlay -->
  <div id="loading" class="fixed inset-0 bg-white/90 z-50 hidden flex-col items-center justify-center">
    <i class="fas fa-circle-notch fa-spin text-4xl text-primary"></i>
    <p class="mt-4 font-semibold text-gray-700">กำลังบันทึกข้อมูล...</p>
  </div>

  <!-- Header -->
  <header class="bg-gradient-to-r from-orange-500 to-primary text-white py-4 px-4 sticky top-0 z-40 shadow-md">
    <div class="max-w-2xl mx-auto flex items-center justify-between">
      <a href="Dash.html" class="text-white/90 hover:text-white transition">
        <i class="fas fa-chevron-left mr-1"></i> กลับหน้าหลัก
      </a>
      <h1 class="text-lg font-semibold tracking-wide">SAFETY PATROL</h1>
      <div class="w-16"></div>
    </div>
  </header>

<!-- Main Content -->
  <main class="max-w-2xl mx-auto px-4 py-6 -mt-4 relative z-10">
    <form id="inspectionForm" class="space-y-4">
      
      <!-- ส่วนเลือกประเภทและพื้นที่ (Dynamic) -->
      <div class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              <i class="fas fa-list-alt text-primary mr-1"></i> ประเภทการตรวจสอบ
            </label>
            <select id="checklistType" name="checklist_type" required onchange="loadChecklistAndAreas(this.value)"
              class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-primary outline-none transition font-prompt">
              <option value="">-- กำลังโหลดประเภท... --</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              <i class="fas fa-user-edit text-primary mr-1"></i> ชื่อผู้ตรวจสอบ
            </label>
            <input type="text" name="inspector" placeholder="ระบุชื่อ-นามสกุล" required
              class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-primary outline-none transition font-prompt">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-2">
              <i class="fas fa-map-marker-alt text-primary mr-1"></i> พื้นที่สำรวจ
            </label>
            <select id="areaSelect" name="area" required disabled
              class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white focus:border-primary outline-none transition font-prompt">
              <option value="">-- กรุณาเลือกประเภทก่อน --</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Checklist Items (สร้างอัตโนมัติจาก DB) -->
      <div id="dynamicItems" class="space-y-4"></div>

      <!-- Submit Button -->
      <button type="submit" id="submitBtn" disabled
        class="w-full bg-gray-400 text-white font-semibold py-4 px-6 rounded-2xl shadow-lg transition-all cursor-not-allowed">
        <i class="fas fa-paper-plane mr-2"></i>ส่งรายงานตรวจสอบ
      </button>
    </form>
  </main>

  <script>
    // URL ของ Google Apps Script ของคุณ
    const API_URL = "https://script.google.com/macros/s/AKfycbzhaO5AbSaTM0CRbxkClrPyKU4PMqAuUFpu90O9_3dD2HTWPk8nz2BlPTTV2eSgt99FKg/exec";
    
    let imgB64 = {};
    let currentChecklistData = [];

    // 1. โหลดประเภททั้งหมดเมื่อเปิดหน้าเว็บ
    window.onload = function() {
      showLoading(true, "กำลังเชื่อมต่อฐานข้อมูล...");
      fetch(API_URL + "?action=getConfig")
        .then(res => res.json())
        .then(data => {
          showLoading(false);
          const typeSelect = document.getElementById('checklistType');
          typeSelect.innerHTML = '<option value="">-- เลือกประเภทการตรวจสอบ --</option>';
          if(data.status === 'success' && data.types) {
            data.types.forEach(t => {
              if(t.is_active === 'TRUE') {
                typeSelect.innerHTML += `<option value="${t.id}">${t.name_th}</option>`;
              }
            });
          }
        }).catch(err => {
          showLoading(false);
          Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อฐานข้อมูลได้', 'error');
        });
    };

    // 2. โหลดพื้นที่และแบบฟอร์มตามประเภทที่เลือก
    function loadChecklistAndAreas(typeId) {
      const areaSelect = document.getElementById('areaSelect');
      const itemsDiv = document.getElementById('dynamicItems');
      const submitBtn = document.getElementById('submitBtn');
      
      if(!typeId) {
        areaSelect.innerHTML = '<option value="">-- กรุณาเลือกประเภทก่อน --</option>';
        areaSelect.disabled = true;
        itemsDiv.innerHTML = '';
        submitBtn.disabled = true;
        submitBtn.className = "w-full bg-gray-400 text-white font-semibold py-4 px-6 rounded-2xl shadow-lg cursor-not-allowed";
        return;
      }

      showLoading(true, "กำลังโหลดแบบฟอร์ม...");
      
      // ดึงข้อมูล 2 อย่างพร้อมกัน: พื้นที่ และ คำถาม
      Promise.all([
        fetch(`${API_URL}?action=getAreasByType&typeId=${typeId}`).then(r => r.json()),
        fetch(`${API_URL}?action=getChecklist&typeId=${typeId}`).then(r => r.json())
      ]).then(([areaData, checklistData]) => {
        showLoading(false);
        
        // จัดการ Area
        areaSelect.innerHTML = '<option value="">-- เลือกพื้นที่/แผนก --</option>';
        if(areaData.status === 'success' && areaData.data) {
          areaData.data.forEach(a => {
            areaSelect.innerHTML += `<option value="${a.area_name}">${a.area_name}</option>`;
          });
          areaSelect.disabled = false;
        }

        // จัดการ Checklist
        if(checklistData.status === 'success' && checklistData.data) {
          currentChecklistData = checklistData.data;
          renderDynamicChecklist(currentChecklistData);
          
          // เปิดปุ่ม Submit
          submitBtn.disabled = false;
          submitBtn.className = "w-full bg-gradient-to-r from-primary to-primary-dark text-white font-semibold py-4 px-6 rounded-2xl shadow-lg shadow-primary/30 hover:shadow-primary/50 active:scale-[0.98] transition-all";
        }
      }).catch(err => {
        showLoading(false);
        Swal.fire('ข้อผิดพลาด', 'โหลดข้อมูลไม่สำเร็จ', 'error');
      });
    }

    // 3. ฟังก์ชันสร้างหน้าจอ (Render) จากข้อมูล Database
    function renderDynamicChecklist(sections) {
      const container = document.getElementById('dynamicItems');
      container.innerHTML = '';
      imgB64 = {};

      sections.forEach((sec, sIdx) => {
        let card = document.createElement('div');
        card.className = 'bg-white rounded-2xl p-5 shadow-sm border border-gray-100';
        let htmlStr = `<h4 class="text-primary-dark font-semibold mb-4 pb-2 border-l-4 border-primary pl-3">${sec.title_th}</h4>`;

        sec.questions.forEach((q, qIdx) => {
          let qKey = `sec${sec.id}_q${q.id}`;
          imgB64[qKey] = [];
          
          htmlStr += `
            <div class="check-item p-4 border-b border-gray-100 last:border-0" id="item_${qKey}">
              <p class="text-sm font-semibold text-gray-700 mb-3">${qIdx + 1}. ${q.question_th}</p>
              
              <div class="grid grid-cols-2 gap-3 mb-3">
                <label class="cursor-pointer py-3 px-4 rounded-xl bg-gray-100 text-center font-semibold text-gray-600 transition border-2 border-transparent hover:border-gray-300 has-[:checked]:bg-green-50 has-[:checked]:text-green-700 has-[:checked]:border-green-500">
                  <input type="radio" name="${qKey}" value="ดี" class="hidden" required>
                  <i class="fas fa-check-circle mr-1"></i> ปกติ
                </label>
                <label class="cursor-pointer py-3 px-4 rounded-xl bg-gray-100 text-center font-semibold text-gray-600 transition border-2 border-transparent hover:border-gray-300 has-[:checked]:bg-red-50 has-[:checked]:text-red-700 has-[:checked]:border-red-500">
                  <input type="radio" name="${qKey}" value="ไม่ดี" class="hidden">
                  <i class="fas fa-exclamation-triangle mr-1"></i> ไม่ปกติ
                </label>
              </div>

              ${q.has_remark === 'TRUE' ? `<textarea name="remark_${qKey}" rows="2" placeholder="เพิ่มเติมความเห็น..." class="w-full px-3 py-2 rounded-lg border border-gray-200 bg-gray-50 focus:bg-white focus:border-primary outline-none resize-none mb-2"></textarea>` : ''}
              
              ${q.has_duedate === 'TRUE' ? `
              <div class="mt-3 p-3 bg-red-50 rounded-xl border border-dashed border-red-300">
                <label class="text-xs text-red-700 font-semibold block mb-2"><i class="fas fa-calendar-times mr-1"></i> กำหนดวันแก้ไขเสร็จ (Due Date)</label>
                <input type="date" name="duedate_${qKey}" class="w-full px-3 py-2 rounded-lg border border-gray-200 bg-white focus:border-primary outline-none">
              </div>` : ''}

              <!-- ส่วนกล้องถ่ายรูป -->
              <div class="mt-4 p-4 bg-gray-50 rounded-xl border border-gray-200">
                <div id="preview-container_${qKey}" class="flex flex-wrap gap-2 mb-3"></div>
                <div id="camera-placeholder_${qKey}" class="flex gap-3">
                  <button type="button" onclick="document.getElementById('fileInputCam_${qKey}').click()" class="flex-1 py-3 px-4 rounded-xl border-2 border-dashed border-gray-300 bg-white hover:bg-gray-50 transition text-center">
                    <i class="fas fa-camera text-primary text-lg"></i><p class="text-xs text-gray-500 font-semibold mt-1">ถ่ายรูป</p>
                  </button>
                </div>
                <input type="file" id="fileInputCam_${qKey}" accept="image/*" capture="environment" class="hidden" onchange="pv(this, '${qKey}')">
              </div>
            </div>
          `;
        });
        card.innerHTML = htmlStr;
        container.appendChild(card);
      });
    }

    // (เก็บฟังก์ชัน pv(), removeImg(), renderPhotos() ของเดิมไว้ตรงนี้ได้เลย เพราะทำงานเกี่ยวกับการแปลงรูปภาพเป็น base64 เหมือนเดิม)
    // ... โค้ดแปลงรูป ...

    function showLoading(show, text = 'กำลังประมวลผล...') {
      const el = document.getElementById('loading');
      if (show) {
        el.querySelector('p').innerText = text;
        el.classList.remove('hidden'); el.classList.add('flex');
      } else {
        el.classList.add('hidden'); el.classList.remove('flex');
      }
    }

    // 4. ตอน Submit ส่งแบบ Dynamic ไปหา Backend
    document.getElementById('inspectionForm').onsubmit = function(e) {
      e.preventDefault();
      var fd = new FormData(this);
      
      var fdDetails = {};
      for (var pair of fd.entries()) { fdDetails[pair[0]] = pair[1]; }
      
      var flatImages = {};
      // วนลูปเอารูปภาพแพ็คใส่ Object (ใช้ Logic เดิมของคุณ)
      // ... 
      
      var payload = {
        action: "submitDynamic", // ส่ง action ใหม่ให้ backend รู้วิธีจัดการ
        inspector: fd.get('inspector'),
        area: fd.get('area'),
        checklist_type: fd.get('checklist_type'),
        details: fdDetails,
        images: flatImages
      };

      showLoading(true, "กำลังบันทึกข้อมูล...");
      fetch(API_URL, {
        method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload)
      })
      .then(r => r.json())
      .then(res => {
        showLoading(false);
        if (res.status === 'success') {
           Swal.fire({ icon: 'success', title: 'ส่งรายงานสำเร็จ' }).then(() => window.location.reload());
        }
      });
    };
  </script>
</body>
</html>
