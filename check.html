<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Safety Patrol Inspection</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #f39c12; --primary-dark: #e67e22; --bg: #f0f2f5; --card-bg: #ffffff;
      --text: #2c3e50; --danger: #e74c3c; --success: #27ae60; --blue: #2980b9;
      --gray: #95a5a6; --border: #e0e0e0; --shadow: 0 4px 20px rgba(0,0,0,0.06);
      --focus-ring: 0 0 0 3px rgba(243, 156, 18, 0.25);
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1a1a2e; --card-bg: #16213e; --text: #eaeaea; --text-muted: #a0a0b0; --border: #3a3a5a; --shadow: 0 4px 20px rgba(0,0,0,0.3); }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Prompt', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; -webkit-tap-highlight-color: transparent; padding-bottom: 80px; }
    :focus-visible { outline: none; box-shadow: var(--focus-ring); }

    /* Header */
    .header { background: linear-gradient(135deg, #ff8c00, var(--primary)); color: white; padding: 18px 15px 40px; text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
    .header h2 { font-size: 1.3rem; font-weight: 700; margin-bottom: 4px; }
    .header p { font-size: 0.8rem; opacity: 0.9; }
    .btn-back { display: inline-flex; align-items: center; gap: 6px; color: white; text-decoration: none; font-size: 0.85rem; margin-bottom: 8px; }

    /* Container & Cards */
    .container { max-width: 600px; margin: -25px auto 0; padding: 0 12px; position: relative; z-index: 101; }
    .card { background: var(--card-bg); border-radius: 16px; padding: 18px; box-shadow: var(--shadow); margin-bottom: 16px; }
    label { font-weight: 600; font-size: 0.9rem; display: block; margin-bottom: 8px; color: #555; }
    .section-label { color: var(--primary-dark); border-left: 4px solid var(--primary); padding-left: 10px; margin: 16px 0 12px; font-size: 1rem; }

    /* Type Selector */
    .type-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
    .type-btn { padding: 10px 6px; border-radius: 12px; border: 2px solid var(--border); background: #f8f9fa; text-align: center; cursor: pointer; font-family: 'Prompt'; font-size: 0.7rem; font-weight: 600; color: #666; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px; min-height: 62px; }
    .type-btn i { font-size: 1.2rem; color: var(--gray); transition: 0.2s; }
    .type-btn:hover { transform: translateY(-2px); border-color: var(--primary); background: #fff9f0; }
    .type-btn:hover i { color: var(--primary); }
    .type-btn.active { background: linear-gradient(145deg, #fff3e0, #ffe0b2); color: var(--primary-dark); border-color: var(--primary-dark); box-shadow: 0 4px 12px rgba(230, 126, 34, 0.2); }
    .type-btn.active i { color: var(--primary-dark); transform: scale(1.1); }
    .type-btn.active-5s { background: linear-gradient(145deg, #e8f5e9, #c8e6c9); color: #219a52; border-color: #219a52; }
    .type-btn.active-5s i { color: #219a52; }

    /* Inputs & Selects */
    input[type="text"], input[type="number"], input[type="date"], select, textarea, .form-select {
      width: 100%; padding: 11px 12px; border-radius: 10px; border: 1.5px solid var(--border);
      font-family: 'Prompt'; font-size: 14px; background: #fafafa; transition: 0.2s; color: var(--text);
    }
    .form-select {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23666' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat; background-position: right 12px center; background-size: 16px;
      cursor: pointer;
    }
    input:focus, select:focus, textarea:focus, .form-select:focus { outline: none; border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(243, 156, 18, 0.15); }
    textarea { resize: vertical; min-height: 65px; }

    /* Check Items */
    .check-item { background: #fff; padding: 14px; margin-bottom: 12px; border-radius: 12px; border: 1.5px solid var(--border); transition: 0.2s; }
    .check-item.error { border-color: var(--danger); background: #fff5f5; animation: shake 0.3s; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
    .check-item small { font-size: 0.9rem; color: var(--text); font-weight: 600; line-height: 1.4; display: block; margin-bottom: 10px; }
    .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 6px 0; }
    .options label { cursor: pointer; padding: 10px; border-radius: 10px; background: #f8f9fa; text-align: center; font-weight: 600; font-size: 0.85rem; margin: 0; transition: 0.2s; border: 2px solid transparent; color: #666; display: flex; align-items: center; justify-content: center; gap: 5px; }
    .options label:hover { background: #f0f0f0; }
    input[type="radio"] { display: none; }
    input[value="ดี"]:checked + label { background: linear-gradient(145deg, #e8f5e9, #c8e6c9); color: #2e7d32; border-color: #2e7d32; }
    input[value="ไม่ดี"]:checked + label { background: linear-gradient(145deg, #ffebee, #ffcdd2); color: #c62828; border-color: #c62828; }
    .duedate-box { display: none; margin-top: 10px; background: linear-gradient(145deg, #fff5f5, #ffebee); padding: 10px 12px; border-radius: 9px; border: 1.5px dashed var(--danger); animation: fadeIn 0.2s; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }
    .water-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; display: inline-block; margin-left: 8px; }
    .water-badge.warning { background: #ffebee; color: #c62828; }
    .water-badge.success { background: #e8f5e9; color: #27ae60; }

    /* Photo Upload */
    .photo-area { background: #fafafa; padding: 10px; border-radius: 10px; border: 1.5px dashed var(--border); margin-top: 10px; }
    .photo-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
    .photo-thumb { position: relative; width: 28%; aspect-ratio: 1/1; border-radius: 8px; overflow: hidden; border: 2px solid var(--border); }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .photo-remove { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; background: var(--danger); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 11px; border: 2px solid white; }
    .photo-caption { margin-top: 5px; font-size: 0.75rem; padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; width: 100%; }
    .camera-row { display: flex; gap: 8px; }
    .btn-cam { flex: 1; padding: 10px; border: 2px dashed var(--border); border-radius: 9px; background: #fff; color: var(--text); font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 0.8rem; }
    .btn-cam:hover { border-color: var(--primary); background: #fff9f0; }

    /* Submit Button */
    .btn-submit { width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: 700; font-size: 1rem; cursor: pointer; box-shadow: 0 6px 20px rgba(230, 126, 34, 0.3); margin-top: 12px; font-family: 'Prompt'; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(230, 126, 34, 0.4); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    /* Loader & Toast */
    .loader { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.92); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:2000; backdrop-filter:blur(5px); }
    .loader.show { display:flex; }
    .loader i { color:var(--primary); font-size:2rem; animation:spin 1s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .toast { position:fixed; bottom:20px; right:20px; padding:10px 16px; border-radius:9px; background:var(--card-bg); box-shadow:0 4px 15px rgba(0,0,0,0.15); z-index:9999; display:flex; align-items:center; gap:8px; font-size:0.85rem; animation:slideIn 0.3s; }
    .toast.success { border-left:4px solid var(--success); }
    .toast.error { border-left:4px solid var(--danger); }
    @keyframes slideIn { from{transform:translateX(100px);opacity:0} to{transform:translateX(0);opacity:1} }

    /* Responsive */
    @media (max-width: 480px) {
      .type-selector { grid-template-columns: repeat(2, 1fr); }
      .header h2 { font-size: 1.15rem; }
    }
    @media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation-duration:0.01ms!important; transition-duration:0.01ms!important; } }
  
    /* ✅ 3-Level Score Options (สำหรับ 5S) */
    .score-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 6px 0; }
    .score-options input[type="radio"] { display: none; }
    .score-label {
      padding: 10px 6px; border-radius: 10px; text-align: center; font-weight: 600; font-size: 0.8rem;
      cursor: pointer; transition: all 0.2s; border: 2px solid var(--border); background: #f8f9fa; color: #666;
      display: flex; flex-direction: column; align-items: center; gap: 4px; min-height: 60px;
    }
    .score-label:hover { background: #f0f0f0; transform: translateY(-1px); }
    .score-label i { font-size: 1.1rem; }
    input[value="ดี"]:checked + .score-label { background: linear-gradient(145deg, #e8f5e9, #c8e6c9); color: #2e7d32; border-color: #2e7d32; }
    input[value="พอใช้"]:checked + .score-label { background: linear-gradient(145deg, #fff3e0, #ffe0b2); color: #e65100; border-color: #e65100; }
    input[value="ปรับปรุง"]:checked + .score-label { background: linear-gradient(145deg, #ffebee, #ffcdd2); color: #c62828; border-color: #c62828; }
  </style>
</head>
<body>

  <div id="loader" class="loader">
    <i class="fas fa-circle-notch"></i>
    <p style="margin-top:15px; font-weight:600;">กำลังบันทึกข้อมูล...</p>
  </div>

  <div class="header">
    <a href="dashnew.html" class="btn-back"><i class="fas fa-chevron-left"></i> กลับหน้า Dashboard</a>
    <h2 id="headerTitle">SAFETY PATROL</h2>
    <p id="headerSub">ระบบตรวจสอบความปลอดภัย</p>
  </div>

  <div class="container">
    <form id="safetyForm">
      <!-- Info Card -->
      <div class="card">
        <label><i class="fas fa-clipboard-check" style="color:var(--primary)"></i> ประเภทการตรวจสอบ</label>
        <div class="type-selector" id="typeSelector">
          <div class="type-btn active" data-type="จป.ว" onclick="selectType('จป.ว', this)"><i class="fas fa-hard-hat"></i>จป.ว</div>
          <div class="type-btn" data-type="คปอ." onclick="selectType('คปอ.', this)"><i class="fas fa-users-cog"></i>คปอ.</div>
          <div class="type-btn" data-type="Foreman/Mgr." onclick="selectType('Foreman/Mgr.', this)"><i class="fas fa-user-tie"></i>Foreman/Mgr.</div>
          <div class="type-btn" data-type="Audit" onclick="selectType('Audit', this)"><i class="fas fa-search"></i>Audit</div>
          <div class="type-btn" data-type="Accident/Fire" onclick="selectType('Accident/Fire', this)"><i class="fas fa-fire-extinguisher"></i>Accident/Fire</div>
          <div class="type-btn" data-type="5S" onclick="selectType('5S', this)"><i class="fas fa-broom"></i>5S</div>
        </div>
        <input type="hidden" id="inspectionType" value="จป.ว">

        <!-- ✅ DROPDOWN: Safety Area -->
        <div id="areaSafety" style="margin-top:12px;">
          <label><i class="fas fa-map-marker-alt" style="color:var(--primary)"></i> พื้นที่สำรวจ</label>
          <select id="areaSafetySelect" class="form-select" onchange="handleAreaChange(this.value)"></select>
          <input type="hidden" id="areaSafetyVal" value="PRINT">
        </div>

        <!-- ✅ DROPDOWN: 5S Area -->
        <div id="area5S" style="margin-top:12px; display:none;">
          <label><i class="fas fa-broom" style="color:var(--success)"></i> พื้นที่ 5S</label>
          <select id="area5SSelect" class="form-select" onchange="handle5SAreaChange(this.value)"></select>
          <input type="hidden" id="area5SVal" value="PRINT">
        </div>

        <label style="margin-top:16px;"><i class="fas fa-user-edit" style="color:var(--primary)"></i> ชื่อผู้ตรวจสอบ</label>
        <input type="text" id="inspectorName" placeholder="ระบุชื่อ-นามสกุล" required>
      </div>

      <!-- Checklist Container -->
      <div id="checklistContainer"></div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <i class="fas fa-paper-plane"></i> ส่งรายงานตรวจสอบ
      </button>
    </form>
  </div>

  <script>
    // ===================================================================
    // CONFIGURATION & DATA
    // ===================================================================
    const CONFIG = {
      API_URL: "https://script.google.com/macros/s/AKfycbwHIUI1ZbFYKeBK7_fkEI6_hfhhhDTxE0fjltus2i-TI7pvhM2CN1HaKDIy4cgXUNT5gQ/exec",
      MAX_IMAGES_PER_ITEM: 3,
      IMAGE_QUALITY: 0.7,
      IMAGE_MAX_WIDTH: 1200,
      DRAFT_KEY: 'safety_form_draft'
    };

    // ✅ Unified Area List
    const UNIFIED_AREAS = [
      { value: "PRINT", label: "🖨️ PRINT", has5S: true, hasSafety: true },
      { value: "LAMINATE", label: "📦 LAMINATE", has5S: true, hasSafety: true },
      { value: "SOLVENT", label: "🧪 SOLVENT", has5S: false, hasSafety: true },
      { value: "REWINDER/SLITTER/PACKING", label: "🔄 REWINDER/SLITTER/PACKING", has5S: true, hasSafety: true },
      { value: "BAG MAKING", label: "🛍️ BAG MAKING", has5S: true, hasSafety: true },
      { value: "QA&QC", label: "🔬 QA & QC", has5S: true, hasSafety: true },
      { value: "WAREHOUSE", label: "🏭 WAREHOUSE", has5S: true, hasSafety: true },
      { value: "OFFICE", label: "🏢 OFFICE", has5S: true, hasSafety: true },
      { value: "CANTEEN", label: "🍽️ CANTEEN", has5S: true, hasSafety: false },
      { value: "ENGINEERING", label: "🔧 ENGINEERING", has5S: true, hasSafety: false },
      { value: "OUTSIDE", label: "🌳 OUTSIDE", has5S: true, hasSafety: true }
    ];

    // ===================================================================
    // 📋 SAFETY CHECKLISTS — แยกตามพื้นที่ (รองรับการแก้ไขในอนาคต)
    // ===================================================================

    // 🏭 แบบมาตรฐาน (พื้นที่โรงงาน/ผลิต/คลังสินค้า)
    const SAFETY_CHECKLIST_FACTORY = {
      s1: { title: "1. สถานที่ทำงาน", qs: [
        "วางสิ่งของในเส้นที่กำหนด", "สถานที่ทำงานมีแสงสว่างเพียงพอ", "สถานที่ทำงาน อากาศ ถ่ายเทสะดวก",
        "การดูแลและทำความสะอาดของพื้นที่", "การจัดเก็บ และกองวัสดุมีการกำหนดสูงไม่เกิน กองวัสดุมีความปลอดภัย", "Water Mist"
      ]},
      s2: { title: "2. ท่าทางการทำงาน", qs: [
        "พนักงานทำงานในท่าทางที่ถูกต้อง", "การใช้รถเข็น, แฮนด์ลิฟท์, หรืออุปกรณ์ที่มีล้อในการเคลื่อนย้ายสิ่งของ", "การยกของอย่างถูกต้องและปลอดภัย"
      ]},
      s3: { title: "3. เครื่องจักร", qs: [
        "พนักงานสวมใส่อุปกรณ์ป้องกันอันตรายขณะปฏิบัติงานตามที่กำหนด", "การปฏิบัติงานตามวิธีการทำงานหรือมาตรฐานการทำงานที่ปลอดภัย",
        "ไม่เปิดการ์ดป้องกันขณะทำงาน", "ปุ่มหยุดฉุกเฉินเข้าถึงได้ง่าย", "ไม่มีเสียง/สั่นผิดปกติ และไม่มีน้ำมันรั่วไหล"
      ]},
      s4: { title: "4. สารเคมี", qs: [
        "การสวมใส่อุปกรณ์ป้องกันอันตรายขณะปฏิบัติงานตามที่กำหนด", "ไม่มีสารเคมีหกรั่วไหล, ไม่มีกลิ่นสารเคมีฟุ้งกระจายในอากาศ",
        "ภาชนะปิดสนิท, สภาพถังใส่สารเคมีแข็งแรงปลอดภัยและสะอาด, อุปกรณ์ใช้งานกับสารเคมีเช่น Valv/Flange/Pipe อยู่ในสภาพไม่ชำรุด รั่วซึม",
        "อากาศถ่ายเท", "มีอุปกรณ์ Spill Kit พร้อมใช้งาน", "มีขั้นตอนการปฏิบัติงาน", "บันทึกการตรวจสายกราวด์", "มีฉลากระบุสารเคมี และมี SDS"
      ]},
      s5: { title: "5. ไฟฟ้า", qs: [
        "ตรวจสอบอุปกรณ์ไฟฟ้าเช่น สายไฟ ปลั๊กไฟ ต้องไม่ชำรุดเสียหาย", "ปล๊กไฟ/เต้าเสียบไม่หลวม", "ไม่มีการต่ออุปกรณ์พวงไฟฟ้าแบบชั่วคราว",
        "อุปกรณ์ไฟฟ้าต้องมีการต่อสายดิน", "ตู้ควบคุมไฟฟ้าปิดเรียบร้อย, ไม่มีสายไฟโผล่, ไม่มีสิ่งกีดขวางหน้าตู้",
        "ไม่มีสิ่งของต่างๆหรือฝุ่นละอองสะสมอยู่บนแผงควบคุมไฟฟ้า, ไม่มีกระดาษ,พลาสติกหรืออุปกรณ์ติดไฟง่าย อยู่ในตู้ไฟและติดหน้าตู้ไฟ"
      ]},
      s6: { title: "6. ระบบป้องกันอัคคีภัย", qs: [
        "ทางหนีไฟไม่มีสิ่งกีดขวาง", "ป้าย EXIT และ Layout ชัดเจน", "ถังดับเพลิงพร้อมใช้งาน (เข็มอยู่ตำแหน่งสีเขียว)", "พื้นที่สะอาด ไม่มีของวางเกะกะ"
      ]},
      s7: { title: "7. การกำจัดของเสีย", qs: ["มีการแยกประเภทขยะ, การปิดฝาถังขยะ, ถังขยะไม่มีชำรุด แตกหัก"] },
      s8: { title: "8. Other", qs: ["ระบุรายการที่ 1 (พิมพ์รายละเอียดในหมายเหตุ)", "ระบุรายการที่ 2 (พิมพ์รายละเอียดในหมายเหตุ)", "ระบุรายการที่ 3 (พิมพ์รายละเอียดในหมายเหตุ)"] }
    };

    // ===================================================================
    // STATE
    // ===================================================================
    let state = { type: 'จป.ว', area: 'PRINT', area5S: 'PRINT', responses: {}, images: {} };

    // ===================================================================
    // INIT & RENDER
    // ===================================================================
    function init() { populateDropdowns(); buildChecklist(); loadDraft(); setupAutoSave(); document.getElementById('safetyForm').addEventListener('submit', handleSubmit); }

    function populateDropdowns() {
      const fillSelect = (id, filterBy, defaultVal) => {
        const sel = document.getElementById(id);
        sel.innerHTML = UNIFIED_AREAS.filter(a => !filterBy || a[filterBy]).map(a => `<option value="${a.value}" ${a.value===defaultVal?'selected':''}>${a.label}</option>`).join('');
      };
      fillSelect('areaSafetySelect', 'hasSafety', state.area);
      fillSelect('area5SSelect', 'has5S', state.area5S);
    }

    function handleAreaChange(val) { state.area = val; document.getElementById('areaSafetyVal').value = val; buildChecklist(); }
    function handle5SAreaChange(val) { state.area5S = val; document.getElementById('area5SVal').value = val; buildChecklist(); }

    function selectType(type, el) {
      state.type = type; document.getElementById('inspectionType').value = type;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active', 'active-5s'));
      el.classList.add(type === '5S' ? 'active-5s' : 'active');
      const is5S = type === '5S';
      document.getElementById('areaSafety').style.display = is5S ? 'none' : 'block';
      document.getElementById('area5S').style.display = is5S ? 'block' : 'none';
      populateDropdowns();
      if (is5S) { state.area5S = "PRINT"; document.getElementById('area5SSelect').value = "PRINT"; }
      else { state.area = "PRINT"; document.getElementById('areaSafetySelect').value = "PRINT"; }
      document.getElementById('headerTitle').textContent = is5S ? 'การตรวจ 5ส' : 'SAFETY PATROL';
      document.getElementById('headerSub').textContent = is5S ? 'กิจกรรม 5 ส' : 'ระบบตรวจสอบความปลอดภัย';
      buildChecklist();
    }

    function buildChecklist() {
      const container = document.getElementById('checklistContainer'); container.innerHTML = ''; state.responses = {}; state.images = {};
      if (state.type === '5S') render5SChecklist(container); else renderSafetyChecklist(container);
    }

    function renderSafetyChecklist(container) {
      const checklist = getSafetyChecklist(state.area); // ✅ ดึงตามพื้นที่
      Object.entries(checklist).forEach(([sKey, section]) => {
        const sNum = sKey.replace('s', ''); const card = document.createElement('div'); card.className = 'card';
        let html = `<div class="section-badge" style="display:inline-block;background:var(--primary);color:#fff;padding:3px 10px;border-radius:15px;font-size:0.7rem;font-weight:700;margin-bottom:10px;">Safety</div><label class="section-label">${section.title}</label>`;
        section.qs.forEach((q, i) => {
          const qKey = `s${sNum}_q${i}`; const isOptional = sKey === 's7' || sKey === 's8';
          const isWater = sKey === 's1' && q === 'Water Mist'; const showWater = (state.area === 'PRINT' || state.area === 'LAMINATE') && isWater;
          if (showWater) {
            html += `<div class="check-item water-mist-block" id="item_${qKey}"><small>${i+1}. ${q}</small>
              <div style="display:flex;align-items:center;gap:10px;margin:8px 0;flex-wrap:wrap;">
                <input type="number" step="any" id="water_val_${sNum}_${i}" placeholder="ระบุ %" style="width:100px;padding:8px;" oninput="handleWaterMist(this.value,'${sNum}',${i})">
                <span style="font-weight:600;">%</span><span id="water_badge_${sNum}_${i}" class="water-badge" style="display:none;"></span>
              </div><input type="hidden" name="section${sNum}_q${i}" id="hidden_${qKey}">
              <textarea name="section${sNum}_remark${i}" placeholder="หมายเหตุ (ถ้ามี)" style="margin:8px 0 0;"></textarea>
              <div class="duedate-box" id="dd_${qKey}"><label><i class="fas fa-calendar-times"></i> วันแก้ไขเสร็จ *</label><input type="date" name="section${sNum}_duedate${i}"></div>${photoUploadHTML(qKey)}</div>`;
          } else {
            html += `<div class="check-item" id="item_${qKey}"><small>${i+1}. ${q} ${!isOptional ? '<span style="color:var(--danger)">*</span>' : ''}</small>
              <div class="options"><input type="radio" name="section${sNum}_q${i}" id="y_${qKey}" value="ดี" onchange="handleStatusChange('${qKey}', 'ดี')"><label for="y_${qKey}"><i class="fas fa-check-circle"></i> ปกติ</label>
              <input type="radio" name="section${sNum}_q${i}" id="n_${qKey}" value="ไม่ดี" onchange="handleStatusChange('${qKey}', 'ไม่ดี')"><label for="n_${qKey}"><i class="fas fa-exclamation-triangle"></i> ไม่ปกติ</label></div>
              <textarea name="section${sNum}_remark${i}" placeholder="หมายเหตุ (ถ้ามี)" style="margin:8px 0 0;"></textarea>
              <div class="duedate-box" id="dd_${qKey}"><label><i class="fas fa-calendar-times"></i> วันแก้ไขเสร็จ *</label><input type="date" name="section${sNum}_duedate${i}"></div>${photoUploadHTML(qKey)}</div>`;
          }
        }); card.innerHTML = html; container.appendChild(card);
      });
    }

    function handle5SStatusChange(qKey, status) {
      const el = document.getElementById(`item_${qKey}`), remark = el.querySelector('textarea'), ddBox = document.getElementById(`dd_${qKey}`), ddInput = ddBox.querySelector('input');
      state.responses[qKey] = { status };
      if (status === "ปรับปรุง") { el.classList.add('needs-attention'); remark.required = true; remark.placeholder = '* กรุณาระบุปัญหาที่ต้องแก้ไข'; ddBox.style.display = 'block'; ddInput.required = true; }
      else { el.classList.remove('needs-attention'); remark.required = false; remark.placeholder = 'หมายเหตุ (ถ้ามี)'; ddBox.style.display = 'none'; ddInput.required = false; ddInput.value = ''; }
    }

    function render5SChecklist(container) {
  // ✅ ดึงข้อมูลพื้นที่ที่เลือก พร้อมตรวจสอบความถูกต้อง
  const areaData = CHECKLIST_5S[state.area5S];
  
  // ✅ กรณีไม่มีข้อมูลสำหรับพื้นที่นี้ → แสดงข้อความแจ้งเตือน
  if (!areaData || !areaData.sections || areaData.sections.length === 0) {
    container.innerHTML = `
      <div class="card" style="text-align:center;padding:30px;color:#666;">
        <i class="fas fa-info-circle fa-2x" style="margin-bottom:10px;color:var(--primary);"></i>
        <p><strong>ยังไม่ได้กำหนดแบบประเมิน 5S</strong></p>
        <p style="font-size:0.9rem;">สำหรับพื้นที่: <strong>${state.area5S}</strong></p>
        <small>กรุณาติดต่อผู้ดูแลระบบเพื่อเพิ่มแบบประเมิน</small>
      </div>
    `;
    return;
  }
  
  const sections = areaData.sections;
  
  sections.forEach((sec, sIdx) => {
    const card = document.createElement('div'); 
    card.className = 'card';
    
    let html = `<div class="section-badge" style="display:inline-block;background:var(--success);color:#fff;padding:3px 10px;border-radius:15px;font-size:0.7rem;font-weight:700;margin-bottom:10px;">5S</div>
      <label class="section-label" style="border-color:var(--success);color:var(--success)">${sec.title}</label>`;
    
    sec.qs.forEach((q, qIdx) => {
      const qKey = `5s_s${sIdx}_q${qIdx}`;
      
      html += `<div class="check-item" id="item_${qKey}">
        <small>${qIdx+1}. ${q}</small>
        <div class="score-options">
          <input type="radio" name="5s_s${sIdx}_q${qIdx}" id="g_${qKey}" value="ดี" onchange="handle5SStatusChange('${qKey}', 'ดี')">
          <label for="g_${qKey}" class="score-label"><i class="fas fa-check-circle"></i>ดี</label>
          
          <input type="radio" name="5s_s${sIdx}_q${qIdx}" id="f_${qKey}" value="พอใช้" onchange="handle5SStatusChange('${qKey}', 'พอใช้')">
          <label for="f_${qKey}" class="score-label"><i class="fas fa-circle-half-stroke"></i>พอใช้</label>
          
          <input type="radio" name="5s_s${sIdx}_q${qIdx}" id="p_${qKey}" value="ปรับปรุง" onchange="handle5SStatusChange('${qKey}', 'ปรับปรุง')">
          <label for="p_${qKey}" class="score-label"><i class="fas fa-wrench"></i>ปรับปรุง</label>
        </div>
        <textarea name="5s_remark_s${sIdx}_q${qIdx}" placeholder="หมายเหตุ (ถ้ามี)" style="margin:8px 0 0;"></textarea>
        <div class="duedate-box" id="dd_${qKey}">
          <label><i class="fas fa-calendar-times"></i> วันแก้ไขเสร็จ *</label>
          <input type="date" name="5s_duedate_s${sIdx}_q${qIdx}">
        </div>
        ${photoUploadHTML(qKey)}
      </div>`;
    });
    
    card.innerHTML = html; 
    container.appendChild(card);
  });
}

    function photoUploadHTML(qKey) { return `<div class="photo-area"><div id="preview_${qKey}" class="photo-preview"></div><div class="camera-row">
      <button type="button" class="btn-cam" onclick="triggerInput('cam','${qKey}')"><i class="fas fa-camera"></i> ถ่ายรูป</button>
      <button type="button" class="btn-cam" onclick="triggerInput('gal','${qKey}')"><i class="fas fa-images"></i> อัลบั้ม</button></div>
      <input type="file" id="cam_${qKey}" accept="image/*" capture="environment" hidden onchange="handlePhoto(this,'${qKey}')">
      <input type="file" id="gal_${qKey}" accept="image/*" hidden onchange="handlePhoto(this,'${qKey}')"></div>`; }

    // ===================================================================
    // EVENT HANDLERS
    // ===================================================================
    function triggerInput(type, qKey) { document.getElementById(`${type}_${qKey}`).click(); }
    function handlePhoto(input, qKey) {
      if (!input.files[0]) return; if (!state.images[qKey]) state.images[qKey] = [];
      if (state.images[qKey].length >= CONFIG.MAX_IMAGES_PER_ITEM) { showToast('จำกัดสูงสุด 3 รูปต่อข้อ', 'error'); input.value = ''; return; }
      const reader = new FileReader(); reader.onload = e => {
        const img = new Image(); img.onload = () => {
          const canvas = document.createElement('canvas'); const scale = Math.min(CONFIG.IMAGE_MAX_WIDTH / img.width, CONFIG.IMAGE_MAX_WIDTH / img.height, 1);
          canvas.width = img.width * scale; canvas.height = img.height * scale; canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          state.images[qKey].push({ b64: canvas.toDataURL('image/jpeg', CONFIG.IMAGE_QUALITY), caption: '' }); renderPhotos(qKey); input.value = '';
        }; img.src = e.target.result; }; reader.readAsDataURL(input.files[0]);
    }
    function renderPhotos(qKey) { const container = document.getElementById(`preview_${qKey}`); container.innerHTML = (state.images[qKey] || []).map((img, idx) => `<div class="photo-thumb"><img src="${img.b64}"><div class="photo-remove" onclick="removePhoto('${qKey}', ${idx})"><i class="fas fa-times"></i></div></div><input class="photo-caption" value="${escapeHtml(img.caption)}" placeholder="คอมเมนต์.." onchange="updateCaption('${qKey}', ${idx}, this.value)">`).join(''); }
    function removePhoto(qKey, idx) { state.images[qKey].splice(idx, 1); renderPhotos(qKey); }
    function updateCaption(qKey, idx, val) { if (state.images[qKey][idx]) state.images[qKey][idx].caption = val; }

    function handleStatusChange(qKey, status) {
      const el = document.getElementById(`item_${qKey}`), remark = el.querySelector('textarea'), ddBox = document.getElementById(`dd_${qKey}`), ddInput = ddBox.querySelector('input');
      state.responses[qKey] = { status };
      if (status === 'ไม่ดี') { el.classList.add('needs-attention'); remark.required = true; remark.placeholder = '* กรุณาระบุรายละเอียด'; ddBox.style.display = 'block'; ddInput.required = true; }
      else { el.classList.remove('needs-attention'); remark.required = false; remark.placeholder = 'หมายเหตุ (ถ้ามี)'; ddBox.style.display = 'none'; ddInput.required = false; ddInput.value = ''; }
    }

    function handleWaterMist(val, sNum, i) {
      const qKey = `s${sNum}_q${i}`, badge = document.getElementById(`water_badge_${sNum}_${i}`), el = document.getElementById(`item_${qKey}`), remark = el.querySelector('textarea'), ddBox = document.getElementById(`dd_${qKey}`), ddInput = ddBox?.querySelector('input'), hidden = document.getElementById(`hidden_${qKey}`);
      if (!val) { badge.style.display='none'; hidden.value=''; state.responses[qKey] = {}; return; }
      const num = parseFloat(val); badge.style.display = 'inline-block';
      if (num < 50) { badge.textContent = '⚠️ ไม่ปกติ'; badge.className = 'water-badge warning'; hidden.value = 'ไม่ดี'; state.responses[qKey] = { status: 'ไม่ดี', waterValue: num }; remark.required = true; ddBox.style.display = 'block'; ddInput.required = true; }
      else { badge.textContent = '✅ ปกติ'; badge.className = 'water-badge success'; hidden.value = 'ดี'; state.responses[qKey] = { status: 'ดี', waterValue: num }; remark.required = false; ddBox.style.display = 'none'; ddInput.required = false; ddInput.value = ''; }
    }

    // ===================================================================
    // VALIDATION & SUBMIT
    // ===================================================================
    function validate() {
      if (!document.getElementById('inspectorName').value.trim()) { showToast('กรุณาระบุชื่อผู้ตรวจสอบ', 'error'); return false; }
      document.querySelectorAll('.check-item').forEach(el => el.classList.remove('error', 'needs-attention')); let valid = true;
      document.querySelectorAll('.check-item').forEach(el => {
        if (el.style.display === 'none') return; const qKey = el.id.replace('item_', '');
        if (state.type === '5S') {
          const radios = el.querySelectorAll('.score-options input[type="radio"]');
          if (radios.length > 0) { const checked = el.querySelector('.score-options input[type="radio"]:checked');
            if (!checked) { el.classList.add('error'); valid = false; }
            else if (checked.value === 'ปรับปรุง') { const remark = el.querySelector('textarea'), dueDate = el.querySelector('input[type="date"]'); if (!remark.value.trim() || !dueDate.value) { el.classList.add('error'); valid = false; } } }
        } else {
          const radios = el.querySelectorAll('input[type="radio"]');
          if (radios.length > 0) { const checked = el.querySelector('input[type="radio"]:checked');
            if (!checked && !el.classList.contains('water-mist-block')) { el.classList.add('error'); valid = false; }
            else if (checked?.value === 'ไม่ดี') { if (!el.querySelector('textarea').value.trim() || !el.querySelector('input[type="date"]').value) { el.classList.add('error'); valid = false; } } }
          if (el.classList.contains('water-mist-block') && el.style.display !== 'none') {
            const wv = el.querySelector('input[type="number"]'); if (!wv.value.trim()) { el.classList.add('error'); valid = false; }
            else if (parseFloat(wv.value) < 50) { if (!el.querySelector('textarea').value.trim() || !el.querySelector('input[type="date"]').value) { el.classList.add('error'); valid = false; } } }
        }
      }); if (!valid) { const firstErr = document.querySelector('.check-item.error'); if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' }); } return valid;
    }

    async function handleSubmit(e) { e.preventDefault(); if (!validate()) return; document.getElementById('loader').classList.add('show'); document.getElementById('submitBtn').disabled = true;
      try { const res = await fetchWithRetry(CONFIG.API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(buildPayload()) });
        if (res.status === 'success') { showToast('✅ ส่งรายงานสำเร็จ', 'success'); localStorage.removeItem(CONFIG.DRAFT_KEY); setTimeout(() => window.location.href = 'Dash.html', 1500); }
        else throw new Error(res.message || 'Submission failed'); } catch (err) { showToast(`❌ ${err.message}`, 'error'); }
      finally { document.getElementById('loader').classList.remove('show'); document.getElementById('submitBtn').disabled = false; }
    }

    function buildPayload() {
  const details = {}, images = {}, is5S = state.type === '5S', area = is5S ? state.area5S : state.area;
  
  // 1. รวบรวมคำตอบ & หมายเหตุ
  Object.entries(state.responses).forEach(([qKey, resp]) => {
    if (!resp.status) return;
    
    // ✅ ใช้คีย์รูปแบบเดียวกันทั้งบันทึกและตรวจสอบ
    const detailKey = qKey.startsWith('5s_') ? qKey : `section${qKey.replace('s', '')}`;
    details[detailKey] = resp.status;
    
    // หมายเหตุ + Due Date เฉพาะ "ปรับปรุง" (5S) หรือ "ไม่ดี" (Safety)
    if ((is5S && resp.status === 'ปรับปรุง') || (!is5S && resp.status === 'ไม่ดี')) {
      details[`${detailKey}_remark`] = document.querySelector(`#item_${qKey} textarea`)?.value || '';
      details[`${detailKey}_duedate`] = document.querySelector(`#item_${qKey} input[type="date"]`)?.value || '';
    }
    
    // Water Mist value
    if (resp.waterValue !== undefined) details.water_val = resp.waterValue;
  });
  
  // 2. รวบรวมรูปภาพ
  Object.entries(state.images).forEach(([qKey, imgs]) => imgs.forEach((img, idx) => {
    let backendKey = qKey;
    if (qKey.startsWith('5s_s')) {
      const match = qKey.match(/5s_s(\d+)_q(\d+)/);
      if (match) backendKey = `5s_${match[1]}_${match[2]}`;
    }
    images[`${backendKey}_${idx}`] = img.b64;
    if (img.caption?.trim()) details[`caption_${backendKey}_${idx}`] = img.caption;
  }));
  
  // 3. คำนวณสถานะรายส่วน (secRes)
  const secRes = {};
  if (is5S) {
    // 5S: ดึงจำนวนส่วนจากพื้นที่จริง
    const sections = (CHECKLIST_5S[state.area5S] || CHECKLIST_5S["OFFICE"])?.sections || [];
    sections.forEach((_, sIdx) => { secRes[`s${sIdx+1}_res`] = 'ดี'; });
  } else {
    // Safety: ใช้ checklist ตามพื้นที่
    const checklist = getSafetyChecklist(area);
    Object.keys(checklist).forEach(sKey => {
      const sNum = sKey.replace('s', '');
      let hasBad = false;
      
      checklist[sKey].qs.forEach((_, qIdx) => {
        // ✅ ใช้คีย์เดียวกันกับที่บันทึกไว้: section1_q0, section2_q1, ...
        if (details[`section${sNum}_q${qIdx}`] === 'ไม่ดี') hasBad = true;
      });
      
      // Water Mist Logic เฉพาะโรงงาน
      if (sKey === 's1' && (area === 'PRINT' || area === 'LAMINATE')) {
        const wv = parseFloat(details.water_val);
        if (!isNaN(wv) && wv < 50) hasBad = true;
      }
      
      secRes[`${sKey}_res`] = hasBad ? 'ไม่ดี' : 'ดี';
    });
  }
  
  // 4. ส่ง payload
  return { 
    inspector: document.getElementById('inspectorName').value.trim(), 
    area, 
    inspectionType: state.type, 
    area5S: is5S ? area : null, 
    images, 
    details, 
    ...secRes 
  };
}

    async function fetchWithRetry(url, options, retries = 3) { for (let i=0; i<retries; i++) { try { const res = await fetch(url, options); return await res.json(); } catch(e) { if(i===retries-1) throw e; await new Promise(r=>setTimeout(r, 1000*(i+1))); } } }

    // ===================================================================
    // DRAFT & UTILS
    // ===================================================================
    function setupAutoSave() { setInterval(() => { localStorage.setItem(CONFIG.DRAFT_KEY, JSON.stringify({ type: state.type, area: state.area, area5S: state.area5S, inspector: document.getElementById('inspectorName').value, timestamp: Date.now() })); }, 30000); }
    function loadDraft() { const raw = localStorage.getItem(CONFIG.DRAFT_KEY); if (!raw) return; try { const d = JSON.parse(raw); if (Date.now() - d.timestamp < 86400000) { document.getElementById('inspectorName').value = d.inspector || ''; if (d.type) selectType(d.type, document.querySelector(`.type-btn[data-type="${d.type}"]`)); state.area = d.area || 'PRINT'; state.area5S = d.area5S || 'PRINT'; populateDropdowns(); buildChecklist(); showToast('📥 โหลดข้อมูลล่าสุดจากเครื่อง', 'success'); } } catch {} }
    function escapeHtml(t) { return t ? t.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])) : ''; }
    function showToast(msg, type='info') { const t = document.createElement('div'); t.className = `toast ${type}`; t.innerHTML = `<i class="fas fa-${type==='success'?'check-circle':'exclamation-circle'}"></i><span>${msg}</span>`; document.body.appendChild(t); setTimeout(() => { t.style.animation = 'slideOut 0.3s'; setTimeout(()=>t.remove(), 300); }, 3000); }
    document.head.appendChild(Object.assign(document.createElement('style'), {textContent:`@keyframes slideOut{from{opacity:1}to{opacity:0;transform:translateX(100px)}}`}));
    init();
  </script>
</body>
</html>
