<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SAFETY DASHBOARD</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* สไตล์เดิมของคุณที่นี่ */
    :root { --primary: #f39c12; --primary-dark: #e67e22; --dark: #2c3e50; --success: #27ae60; --danger: #e74c3c; --info: #2980b9; --bg: #f4f7f6; --card-bg: #ffffff; --text: #333333; --text-muted: #7f8c8d; --border: #e0e0e0; --light-orange: #fff5e6; --shadow: 0 4px 15px rgba(0,0,0,0.05); }
    body { font-family: 'Prompt', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); }
    /* ... (คงสไตล์เดิมไว้ทั้งหมด) ... */
  </style>
</head>
<body>

  <div id="loader" class="loader"><i class="fas fa-circle-notch"></i><p>กำลังโหลดข้อมูล...</p></div>
  <nav class="nav">...</nav>
  <div class="container">...</div>

  <script>
    // ===================================================================
    // CONFIGURATION & DATA (คงเดิมของคุณ)
    // ===================================================================
    const CONFIG = {
      API_URL: "https://script.google.com/macros/s/AKfycbzhaO5AbSaTM0CRbxkClrPyKU4PMqAuUFpu90O9_3dD2HTWPk8nz2BlPTTV2eSgt99FKg/exec",
      TYPE_5S: "5S",
      AREA_DISPLAY_MAP: { "PRINT": "PRINT", "LAMINATE": "LAMINATE", "SOLVENT": "SOLVENT", "REWINDER/SLITTER/PACKING": "REWINDER/SLITTER/PACKING", "BAG MAKING": "BAG MAKING", "QA&QC": "QA&QC", "WAREHOUSE": "WAREHOUSE", "OFFICE": "OFFICE", "CANTEEN": "CANTEEN", "FACTORY": "FACTORY", "ENGINEERING": "ENGINEERING", "OUTSIDE": "OUTSIDE" }
    };
    
    // ... (วางส่วนของ AREA_DATA และ CHECKLIST_SAFETY / CHECKLIST_5S เดิมของคุณที่นี่) ...

    let fullData = [];
    let currentTypeFilter = 'all';
    let currentStatusFilter = 'all';
    let isLoading = false;

    window.onload = function() {
      document.getElementById('dateFilter').valueAsDate = new Date();
      updateAreaOptions('all');
      loadData();
    };

    // ... (คงฟังก์ชัน selectTypeFilter, updateAreaOptions, toggleAreaDropdown, selectArea, updateStatusFilter เดิมของคุณไว้) ...

    async function loadData() {
      if (isLoading) return;
      isLoading = true;
      const loader = document.getElementById('loader');
      if (loader) loader.classList.add('show');
      
      const dateVal = document.getElementById('dateFilter').value;
      try {
        const response = await fetch(`${CONFIG.API_URL}?action=getDashboardData&date=${dateVal}`);
        const data = await response.json();
        fullData = data.details || [];
        fullData.forEach(d => {
          if (d.inspectionType === CONFIG.TYPE_5S && d.fullChecklist) {
            d.hasBad = Object.values(d.fullChecklist).includes("ไม่ดี");
          }
        });
        renderTable(); 
      } catch (err) { console.error("Load data error:", err); } 
      finally { isLoading = false; if (loader) loader.classList.remove('show'); }
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      if (!tbody) return;
      const areaVal = document.getElementById('areaFilter')?.value || "";
      
      let filtered = fullData.filter(d => currentTypeFilter === 'all' || d.inspectionType === currentTypeFilter);
      
      if (areaVal !== "") {
        filtered = filtered.filter(item => {
          const normArea = normalizeAreaForFilter(item.area);
          if (areaVal === "OFFICE_ALL") return normArea === "OFFICE";
          if (areaVal === "QA_ALL") return normArea === "QA&QC";
          if (areaVal === "OUTSIDE_ALL") return normArea === "OUTSIDE";
          return normArea === areaVal;
        });
      }
      
      if (currentStatusFilter === 'good') filtered = filtered.filter(d => !d.hasBad);
      else if (currentStatusFilter === 'bad') filtered = filtered.filter(d => d.hasBad);
      
      tbody.innerHTML = filtered.length === 0 ? '<tr><td colspan="7" class="empty-state"><p>ไม่พบข้อมูล</p></td></tr>' : filtered.map(d => `
        <tr>
          <td>${d.timestamp}</td>
          <td>${getTypeBadge(d.inspectionType)}</td>
          <td><strong>${normalizeAreaDisplay(d.area)}</strong></td>
          <td>${d.inspector}</td>
          <td>${d.hasBad ? '<span class="badge badge-bad">✘ พบปัญหา</span>' : '<span class="badge badge-good">✔ ปกติ</span>'}</td>
          <td>${d.photo ? '<i class="fas fa-image"></i>' : '-'}</td>
          <td><button class="btn-view" onclick="toggleDetail(${d.id})"><i class="fas fa-chevron-down" id="icon-${d.id}"></i> ดูผลตรวจ</button></td>
        </tr>
        ${renderDetailRow(d)}
      `).join('');
    }

    // ===================================================================
    // รวมฟังก์ชันที่จำเป็นไว้ท้ายสุดเพื่อป้องกัน Error
    // ===================================================================
    function renderDetailRow(d) {
        const is5S = d.inspectionType === CONFIG.TYPE_5S;
        const areaKey = is5S ? (d.area || 'OFFICE') : null;
        let detailHtml = `<tr class="detail-row" id="detail-${d.id}"><td colspan="7"><div class="inner-detail">`;
        /* (ใส่ logic renderDetailRow เดิมของคุณที่นี่) */
        detailHtml += `</div></td></tr>`;
        return detailHtml;
    }

    function renderPhotos(photoObj, baseKey, fullChecklist) {
      if (!photoObj || typeof photoObj !== 'object') return '';
      // ... (โค้ด renderPhotos เดิม) ...
      return "";
    }

    function getDriveThumbnailUrl(url) {
      if (!url || url === "-" || url === "") return "";
      const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      return match ? `https://drive.google.com/thumbnail?id=${match[1]}&sz=w500` : url;
    }

    function normalizeAreaForFilter(area) {
      const aliasMap = { "แผนก Print": "PRINT", "แผนก Laminate": "LAMINATE", "แผนก Solvent": "SOLVENT", "แผนก Rewinder / Slitter / Packing": "REWINDER/SLITTER/PACKING", "แผนก BAG MAKING": "BAG MAKING", "แผนก QA & QC": "QA&QC", "แผนก Warehouse": "WAREHOUSE", "Office": "OFFICE", "พื้นที่รอบบริเวณโรงงาน": "OUTSIDE", "Canteen": "CANTEEN", "EN": "ENGINEERING" };
      return aliasMap[area] || area;
    }

    function normalizeAreaDisplay(area) { return CONFIG.AREA_DISPLAY_MAP[normalizeAreaForFilter(area)] || area; }
    function escapeHtml(text) { return text ? text.toString().replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])) : ''; }
    function getTypeBadge(type) { return `<span class="type-badge ${type === CONFIG.TYPE_5S ? 'type-badge-5s' : 'type-badge-safety'}">${type}</span>`; }
    function toggleDetail(id) { /* Toggle logic */ }
  </script>
</body>
</html>
